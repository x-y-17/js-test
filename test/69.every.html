<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const arr = [];
      const customEvery = (arr, callback) => {
        for (let i = 0; i <= arr.length; i++) {
          if (!callback(arr[i])) {
            return false;
          }
        }
        return true;
      };
      const result = customEvery(arr, (item) => {
        return item.content > 0;
      });
      console.log(result);
    </script>
  </body>
</html>
